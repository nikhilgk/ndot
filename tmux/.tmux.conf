# Set the prefix key to ` (backtick)
set -g prefix `
unbind C-b # Unbind the default prefix key
bind-key ` send-prefix






# set-window-option -g mode-keys vi
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"


#############################





# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# split panes using | and -, make sure they open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# reload config file
bind r source-file ~/.tmux.conf

unbind p
bind p previous-window

# shorten command delay
set -sg escape-time 1

# don't rename windows automatically
set -g allow-rename off

# mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# enable vi mode keys
set-window-option -g mode-keys vi

# set default terminal mode to 256 colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

## THEME
set -g status-bg '#ff5f87'
set -g status-fg black
set -g status-left-length 30
set -g status-left '#[bg=#ff5f87,fg=black,bold] #S #[fg=black,bg=#ff5f87] '
setw -g window-status-style          'fg=black,bg=#ff5f87'
setw -g window-status-current-style  'fg=black,bg=#ff5f87,bold,reverse'
setw -g window-status-activity-style 'fg=black,bg=#ff5f87,bold'
#set -g status-interval 60
# Show the session name (instead of the default pane_title) on the right, with
# the clock. tmux-continuum appends its invisible auto-save hook after this
# (tpm runs at the bottom of the file), so session saving keeps working.
set -g status-right-length 50
set -g status-right '#[fg=black,bg=#ff5f87,bold] #S #[nobold]%H:%M %d-%b-%y '

# allow focus events to get through to applications running in tmux
set -g focus-events on


# Design Tweaks
# -------------

# loud or quiet?
set -g visual-activity on
set -g visual-bell on
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g clock-mode-colour yellow
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
# NOTE: status bar colors/layout intentionally left to the pink ## THEME block
# above (local override). Upstream's black/red status theme was removed here so
# it does not override the pink theme.
set -g status-position bottom
set -g status-justify left

# messages
set -g message-style 'fg=yellow bg=terminal bold'

# copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

# Copy and paste with the mouse
bind -T root MouseDrag1Pane if-shell -F -t= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -M'
# bind-key -T copy-mode-vi M-w copy-pipe-and-cancel "xclip -i -selection clipboard"

# Support for system clipboard
set-option -g set-clipboard on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum settings
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'